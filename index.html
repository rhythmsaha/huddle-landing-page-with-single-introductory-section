<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" href="./images/favicon-32x32.png" />
        <link rel="stylesheet" href="style.css" />
        <title>
            Frontend Mentor | Huddle landing page with single introductory
            section
        </title>
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
            integrity="sha512-1ycn6IcaQQ40/MKBW2W4Rhis/DbILU74C1vSrLJxCq57o941Ym01SwNsOMqvEBFlcgUa6xLiPY/NS5R+E6ztJQ=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Open+Sans&family=Poppins:wght@400;600&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <header><img src="/images/logo.svg" alt="logo" /></header>
        <main>
            <section class="hero">
                <img src="/images/illustration-mockups.svg" alt="" />
            </section>

            <section class="content">
                <h2>Build The Community</h2>
                <h2>Your Fans Will Love</h2>

                <p>
                    Huddle re-imagines the way we build communities. You have a
                    voice, but so does your audience. Create connections with
                    your users as you engage in genuine discussion.
                </p>

                <button>Register</button>
            </section>
        </main>

        <div class="social">
            <span>
                <i class="fab fa-facebook-f"></i>
            </span>

            <span>
                <i class="fab fa-twitter"></i>
            </span>

            <span>
                <i class="fab fa-instagram"></i>
            </span>
        </div>
    </body>
</html>
